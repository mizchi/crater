[repo]
owner = "mizchi"
name = "crater"

[storage]
path = ".flaker/data.duckdb"

[adapter]
type = "playwright"

[runner]
type = "playwright"
command = "pnpm exec playwright test"

[affected]
resolver = "bitflow"
config = "flaker.star"

[quarantine]
auto = true
flaky_rate_threshold = 30.0
min_runs = 5

[flaky]
window_days = 14
detection_threshold = 2.0
