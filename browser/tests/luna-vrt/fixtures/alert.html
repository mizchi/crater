<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root {
  --background: #ffffff;
  --foreground: #1f2937;
  --muted: #f3f4f6;
  --muted-foreground: #6b7280;
  --border: #e5e7eb;
  --accent: #3b82f6;
  --accent-foreground: #ffffff;
  --destructive: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  margin: 0;
  padding: 16px;
  background: var(--background);
  color: var(--foreground);
}
.alert {
  position: relative;
  padding: 0.75rem 1rem;
  padding-left: 1.25rem;
  border-radius: 0.375rem;
  background: var(--muted);
  color: var(--foreground);
  margin-bottom: 0.75rem;
}
.alert:last-child { margin-bottom: 0; }
.alert::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 0.375rem 0 0 0.375rem;
  background: var(--accent);
}
.alert__title {
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 0.25rem;
}
.alert__description {
  font-size: 0.875rem;
  color: var(--muted-foreground);
}
.alert--error::before { background: var(--destructive); }
.alert--error .alert__title { color: var(--destructive); }
.alert--warning::before { background: var(--warning); }
.alert--warning .alert__title { color: var(--warning); }
.alert--success::before { background: var(--success); }
.alert--success .alert__title { color: var(--success); }
</style>
</head>
<body>
<div id="target" style="max-width: 400px;">
  <div role="alert" aria-live="polite" data-variant="error" class="alert alert--error">
    <div class="alert__title">Error</div>
    <div class="alert__description">Something went wrong. Please try again.</div>
  </div>
  <div role="alert" aria-live="polite" data-variant="warning" class="alert alert--warning">
    <div class="alert__title">Warning</div>
    <div class="alert__description">This action cannot be undone.</div>
  </div>
  <div role="alert" aria-live="polite" data-variant="success" class="alert alert--success">
    <div class="alert__title">Success</div>
    <div class="alert__description">Your changes have been saved.</div>
  </div>
  <div role="alert" aria-live="polite" data-variant="status" class="alert alert--status">
    <div class="alert__title">Info</div>
    <div class="alert__description">A new version is available.</div>
  </div>
</div>
</body>
</html>
