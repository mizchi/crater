<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root {
  --background: #ffffff;
  --foreground: #1f2937;
  --muted: #f3f4f6;
  --muted-foreground: #6b7280;
  --border: #e5e7eb;
  --accent: #3b82f6;
  --accent-foreground: #ffffff;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  margin: 0;
  padding: 16px;
  background: var(--background);
  color: var(--foreground);
}
.checkbox {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.checkbox__control {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 1.25rem;
  height: 1.25rem;
  border-radius: 0.25rem;
  background: var(--background);
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.checkbox[data-checked="true"] .checkbox__control {
  background: var(--accent);
  border-color: var(--accent);
}
.checkbox[data-disabled] { opacity: 0.5; }
.checkbox__label {
  font-size: 0.875rem;
  line-height: 1.25rem;
  color: var(--foreground);
}
.checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }
</style>
</head>
<body>
<div id="target" class="checkbox-group" style="max-width: 300px;">
  <div class="checkbox" data-checked="false">
    <span class="checkbox__control"></span>
    <span class="checkbox__label">Unchecked</span>
  </div>
  <div class="checkbox" data-checked="true">
    <span class="checkbox__control"></span>
    <span class="checkbox__label">Checked</span>
  </div>
  <div class="checkbox" data-checked="false" data-disabled>
    <span class="checkbox__control"></span>
    <span class="checkbox__label">Disabled</span>
  </div>
</div>
</body>
</html>
