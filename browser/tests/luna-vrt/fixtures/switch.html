<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root {
  --background: #ffffff;
  --foreground: #1f2937;
  --muted-foreground: #6b7280;
  --accent: #3b82f6;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  margin: 0;
  padding: 16px;
  background: var(--background);
  color: var(--foreground);
}
.switch {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0;
  border: none;
  background: transparent;
  font-weight: 500;
  font-size: 0.875rem;
  color: var(--foreground);
}
.switch[data-disabled] { opacity: 0.5; }
.switch__track {
  position: relative;
  display: flex;
  align-items: center;
  width: 3rem;
  height: 1.5rem;
  border-radius: 9999px;
  background: var(--muted-foreground);
  flex-shrink: 0;
}
.switch[data-state="on"] .switch__track {
  background: var(--accent);
}
.switch__thumb {
  position: absolute;
  left: 2px;
  width: 1.125rem;
  height: 1.125rem;
  border-radius: 50%;
  background: var(--background);
}
.switch[data-state="on"] .switch__thumb {
  transform: translateX(1.5rem);
}
.switch-group { display: flex; flex-direction: column; gap: 0.75rem; }
</style>
</head>
<body>
<div id="target" class="switch-group" style="max-width: 300px;">
  <div class="switch" data-state="off">
    <span class="switch__track"><span class="switch__thumb"></span></span>
    <span class="switch__label">Notifications</span>
  </div>
  <div class="switch" data-state="on">
    <span class="switch__track"><span class="switch__thumb"></span></span>
    <span class="switch__label">Dark mode</span>
  </div>
  <div class="switch" data-state="off" data-disabled>
    <span class="switch__track"><span class="switch__thumb"></span></span>
    <span class="switch__label">Disabled</span>
  </div>
</div>
</body>
</html>
