name: Browser

on:
  push:
    branches: [main]
    paths:
      - 'aomx/**'
      - 'benchmarks/**'
      - 'browser/**'
      - 'css/**'
      - 'dom/**'
      - 'js/**'
      - 'justfile'
      - 'layout/**'
      - 'moon.mod.json'
      - 'moon.work'
      - 'painter/**'
      - 'renderer/**'
      - 'testing/**'
      - 'webvitals/**'
      - '.github/workflows/browser.yml'
  pull_request:
    branches: [main]
    paths:
      - 'aomx/**'
      - 'benchmarks/**'
      - 'browser/**'
      - 'css/**'
      - 'dom/**'
      - 'js/**'
      - 'justfile'
      - 'layout/**'
      - 'moon.mod.json'
      - 'moon.work'
      - 'painter/**'
      - 'renderer/**'
      - 'testing/**'
      - 'webvitals/**'
      - '.github/workflows/browser.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Show MoonBit version
        run: moon version --all

      - name: Update dependencies (root)
        run: moon update

      - name: Update dependencies (browser)
        run: moon update --manifest-path browser/moon.mod.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check code
        run: moon check --manifest-path browser/moon.mod.json --target js -j 1

      - name: Run tests
        run: moon test --manifest-path browser/moon.mod.json -p mizchi/crater-browser --target js -j 1

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install npm dependencies
        working-directory: browser
        run: npm install

      - name: Build JS bundle
        working-directory: browser
        run: npm run build
