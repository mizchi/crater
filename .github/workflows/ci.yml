name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Show MoonBit version
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Update js dependencies
        run: moon update --manifest-path js/moon.mod.json

      - name: Update browser dependencies
        run: moon update --manifest-path browser/moon.mod.json

      - name: Check code
        run: moon check

      - name: Check js code
        run: moon check --manifest-path js/moon.mod.json

      - name: Check browser code
        run: moon check --manifest-path browser/moon.mod.json

      - name: Run tests
        run: moon test
        continue-on-error: true

      - name: Run js tests
        run: moon test --manifest-path js/moon.mod.json
        continue-on-error: true

      - name: Run browser tests
        run: moon test --manifest-path browser/moon.mod.json --target js
        continue-on-error: true

      - name: Format check
        run: |
          moon fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'moon fmt' to fix." && exit 1)
        continue-on-error: true

  js-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path js/moon.mod.json

      - name: Build js package
        run: pnpm run build
        working-directory: js

      - name: Run js package tests
        run: pnpm test
        working-directory: js

      - name: Build playground
        run: pnpm run build
        working-directory: js/playground

  wasm-component:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install wasm-tools
        run: |
          curl -LO https://github.com/bytecodealliance/wasm-tools/releases/download/v1.219.1/wasm-tools-1.219.1-x86_64-linux.tar.gz
          tar xzf wasm-tools-1.219.1-x86_64-linux.tar.gz
          sudo mv wasm-tools-1.219.1-x86_64-linux/wasm-tools /usr/local/bin/
          wasm-tools --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: moon update

      - name: Build and test WASM
        run: just wasm

  wpt-css-tests:
    name: wpt-css (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: wasm-component
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: shard-1
            modules: css-overflow css-grid css-tables
            soft_fail: true
          - name: shard-2
            modules: css-contain css-display
            soft_fail: true
          - name: shard-3
            modules: css-flexbox filter-effects
            soft_fail: true
          - name: shard-4
            modules: css-sizing css-align css-variables
            soft_fail: true
          # Enforce full pass for css-position to prevent regressions.
          - name: css-position-strict
            modules: css-position
            soft_fail: false
          # Enforce full pass for currently green modules.
          - name: css-box-strict
            modules: css-box
            soft_fail: false
          - name: compositing-strict
            modules: compositing
            soft_fail: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install wasm-tools
        run: |
          curl -LO https://github.com/bytecodealliance/wasm-tools/releases/download/v1.219.1/wasm-tools-1.219.1-x86_64-linux.tar.gz
          tar xzf wasm-tools-1.219.1-x86_64-linux.tar.gz
          sudo mv wasm-tools-1.219.1-x86_64-linux/wasm-tools /usr/local/bin/
          wasm-tools --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: moon update

      - name: Build WASM
        run: just build-wasm && just transpile-wasm

      - name: Run WPT CSS shard
        run: |
          mkdir -p wpt-reports
          npx tsx scripts/wpt-runner.ts ${{ matrix.modules }} --workers 4 --json "wpt-reports/wpt-css-${{ matrix.name }}.json"
        continue-on-error: ${{ matrix.soft_fail }}

      - name: Upload WPT CSS shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-css-report-${{ matrix.name }}
          path: wpt-reports/wpt-css-${{ matrix.name }}.json
          if-no-files-found: warn

  wpt-dom-tests:
    name: wpt-dom
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json

      - name: Run WPT DOM shard
        run: |
          mkdir -p wpt-reports
          status=0
          npx tsx scripts/wpt-dom-runner.ts --dom --json "wpt-reports/wpt-dom-dom.json" || status=1
          npx tsx scripts/wpt-dom-runner.ts --svg --json "wpt-reports/wpt-dom-svg.json" || status=1
          exit $status
        continue-on-error: true

      - name: Upload WPT DOM shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-dom-report-all
          path: wpt-reports/wpt-dom-*.json
          if-no-files-found: warn

  wpt-compat-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - wpt-css-tests
      - wpt-dom-tests
      - wpt-webdriver-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Download WPT shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: wpt-*-report-*
          path: wpt-reports
          merge-multiple: true

      - name: Aggregate WPT compatibility summary
        run: |
          mkdir -p wpt-summary
          npx tsx scripts/wpt-ci-summary.ts \
            --input wpt-reports \
            --json wpt-summary/wpt-compat-summary.json \
            --markdown wpt-summary/wpt-compat-summary.md

      - name: Publish WPT summary
        run: cat wpt-summary/wpt-compat-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload WPT compatibility summary
        uses: actions/upload-artifact@v4
        with:
          name: wpt-compat-summary
          path: wpt-summary/*
          if-no-files-found: error

  wpt-webdriver-tests:
    name: wpt-webdriver
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json

      - name: Build BiDi server
        run: just build-bidi

      - name: Run WebDriver BiDi shard
        run: |
          mkdir -p wpt-reports
          status=0

          npx tsx scripts/wpt-webdriver-runner.ts --quick "errors" --json "wpt-reports/wpt-webdriver-errors.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "session/status" --json "wpt-reports/wpt-webdriver-session-status.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "session/subscribe/events.py" --json "wpt-reports/wpt-webdriver-session-subscribe-events.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "session/unsubscribe/events.py" --json "wpt-reports/wpt-webdriver-session-unsubscribe-events.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "browsing_context/get_tree" --json "wpt-reports/wpt-webdriver-browsing-context-get-tree.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "browsing_context/context_created/context_created.py" --json "wpt-reports/wpt-webdriver-browsing-context-context-created.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "script/evaluate/invalid.py" --json "wpt-reports/wpt-webdriver-script-evaluate-invalid.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "script/get_realms" --json "wpt-reports/wpt-webdriver-script-get-realms.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "script/realm_created/realm_created.py" --json "wpt-reports/wpt-webdriver-script-realm-created.json" || status=1
          npx tsx scripts/wpt-webdriver-runner.ts --quick "script/realm_created/window_open.py" --json "wpt-reports/wpt-webdriver-script-realm-window-open.json" || status=1
          exit $status

      - name: Upload WPT WebDriver shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-webdriver-report-all
          path: wpt-reports/wpt-webdriver-*.json
          if-no-files-found: warn

  playwright-bidi-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json

      - name: Build BiDi server
        run: just build-bidi

      - name: Start BiDi server
        run: |
          just start-bidi &
          sleep 3

      - name: Run Playwright adapter tests
        run: just test-playwright-adapter

      - name: Run Playwright BiDi E2E tests
        run: just test-playwright

      - name: Run website loading tests
        run: just test-website

  playwright-vrt-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers for VRT
        run: pnpm exec playwright install --with-deps chromium

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json

      - name: Build BiDi server
        run: just build-bidi

      - name: Run paint VRT
        run: just test-vrt

      - name: Run WPT VRT
        run: just test-wpt-vrt

      - name: Upload VRT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-vrt-artifacts
          path: |
            output/playwright/vrt/**
            test-results/**
          if-no-files-found: warn

  ci-timing-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - test
      - js-package
      - wasm-component
      - wpt-css-tests
      - wpt-dom-tests
      - wpt-webdriver-tests
      - wpt-compat-summary
      - playwright-bidi-tests
      - playwright-vrt-tests
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Collect CI job timings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const filtered = jobs.filter((job) => job.name !== "ci-timing-summary");
            fs.mkdirSync("ci-timing", { recursive: true });
            fs.writeFileSync(
              "ci-timing/jobs.json",
              JSON.stringify({ run_id: context.runId, jobs: filtered }, null, 2),
              "utf-8",
            );

      - name: Build CI timing summary
        run: |
          npx tsx scripts/ci-timing-summary.ts \
            --input ci-timing/jobs.json \
            --json ci-timing/summary.json \
            --markdown ci-timing/summary.md

      - name: Publish CI timing summary
        run: cat ci-timing/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI timing summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-timing-summary
          path: ci-timing/*
          if-no-files-found: error
