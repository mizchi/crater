name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 15 * * *'  # Daily at 00:00 JST

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Show MoonBit version
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Prefetch root dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh

      - name: Update js dependencies
        run: moon update --manifest-path js/moon.mod.json

      - name: Prefetch js dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path js/moon.mod.json

      - name: Update browser dependencies
        run: moon update --manifest-path browser/moon.mod.json

      - name: Prefetch browser dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path browser/moon.mod.json

      - name: Update browser/native dependencies
        run: moon -C browser/native update

      - name: Prefetch browser/native dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path browser/native/moon.mod.json

      - name: Update wasm dependencies
        run: moon -C wasm update

      - name: Prefetch wasm dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path wasm/moon.mod.json

      - name: Check code
        run: just check

      - name: Run native facade smoke
        run: moon -C browser/native test -p mizchi/crater-browser-native --target native -j 1

      - name: Run native V8 runtime smoke
        run: moon -C browser/native test -p mizchi/crater-browser-native/js_v8 -f js_runtime_v8_wbtest.mbt --target native -j 1

      - name: Run native V8 DOM/snapshot smoke
        run: moon -C browser/native test -p mizchi/crater-browser-native/js_v8 -f js_runtime_v8_dom_wbtest.mbt --target native -j 1

      - name: Run tests
        run: just test-js
        continue-on-error: true

      - name: Run js tests
        run: moon test --manifest-path js/moon.mod.json --target js
        continue-on-error: true

      - name: Run browser tests
        run: moon test --manifest-path browser/moon.mod.json -p mizchi/crater-browser --target js -j 1
        continue-on-error: true

      - name: Format check
        run: |
          just fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'just fmt' to fix." && exit 1)
        continue-on-error: true

      - name: Upload Moon diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: moon-diagnostics-test
          path: ci-logs/**
          if-no-files-found: warn

  js-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Restore paint VRT reference fixtures
        id: paint_vrt_reference_cache
        uses: actions/cache@v4
        with:
          path: .cache/paint-vrt-reference
          key: paint-vrt-reference-${{ runner.os }}-${{ hashFiles('tests/paint-vrt.test.ts', 'tests/helpers/crater-vrt.ts', 'scripts/real-world-snapshot.ts', 'scripts/ci/install-compatible-fonts.sh', 'package.json', 'pnpm-lock.yaml', 'benchmarks/fixtures/**', 'real-world/**/index.html', 'real-world/**/meta.json') }}

      - name: Restore Playwright Chromium browser cache
        id: paint_vrt_playwright_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path js/moon.mod.json

      - name: Build js package
        run: pnpm run build
        working-directory: js

      - name: Run js package tests
        run: pnpm test
        working-directory: js

      - name: Build playground
        run: pnpm run build
        working-directory: js/playground

  wasm-component:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install wasm-tools
        run: |
          curl -LO https://github.com/bytecodealliance/wasm-tools/releases/download/v1.219.1/wasm-tools-1.219.1-x86_64-linux.tar.gz
          tar xzf wasm-tools-1.219.1-x86_64-linux.tar.gz
          sudo mv wasm-tools-1.219.1-x86_64-linux/wasm-tools /usr/local/bin/
          wasm-tools --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: moon update

      - name: Update wasm module dependencies
        run: moon -C wasm update

      - name: Build and test WASM
        run: |
          just test-wasm-mbt
          just wasm

  wpt-css-tests:
    name: wpt-css (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: wasm-component
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: shard-1
            modules: css-overflow css-grid css-tables
            soft_fail: true
          - name: shard-2
            modules: css-contain css-display
            soft_fail: true
          - name: shard-3
            modules: css-flexbox filter-effects
            soft_fail: true
          - name: shard-4
            modules: css-sizing css-align css-variables
            soft_fail: true
          # Enforce full pass for css-position to prevent regressions.
          - name: css-position-strict
            modules: css-position
            soft_fail: false
          # Enforce full pass for currently green modules.
          - name: css-box-strict
            modules: css-box
            soft_fail: false
          - name: compositing-strict
            modules: compositing
            soft_fail: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install wasm-tools
        run: |
          curl -LO https://github.com/bytecodealliance/wasm-tools/releases/download/v1.219.1/wasm-tools-1.219.1-x86_64-linux.tar.gz
          tar xzf wasm-tools-1.219.1-x86_64-linux.tar.gz
          sudo mv wasm-tools-1.219.1-x86_64-linux/wasm-tools /usr/local/bin/
          wasm-tools --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: moon update

      - name: Update wasm module dependencies
        run: moon -C wasm update

      - name: Build WASM
        run: just build-wasm && just transpile-wasm

      - name: Run WPT CSS shard
        run: |
          mkdir -p wpt-reports
          npx tsx scripts/wpt-runner.ts ${{ matrix.modules }} --workers 4 --json "wpt-reports/wpt-css-${{ matrix.name }}.json"
        continue-on-error: ${{ matrix.soft_fail }}

      - name: Upload WPT CSS shard report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wpt-css-report-${{ matrix.name }}
          path: wpt-reports/wpt-css-${{ matrix.name }}.json
          if-no-files-found: warn

  wpt-dom-tests:
    name: wpt-dom
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json

      - name: Run WPT DOM shard
        run: |
          mkdir -p wpt-reports
          status=0
          npx tsx scripts/wpt-dom-runner.ts --dom --json "wpt-reports/wpt-dom-dom.json" || status=1
          npx tsx scripts/wpt-dom-runner.ts --svg --json "wpt-reports/wpt-dom-svg.json" || status=1
          exit $status
        continue-on-error: true

      - name: Upload WPT DOM shard report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wpt-dom-report-all
          path: wpt-reports/wpt-dom-*.json
          if-no-files-found: warn

  wpt-compat-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - wpt-css-tests
      - wpt-dom-tests
      - wpt-webdriver-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Download WPT shard reports
        uses: actions/download-artifact@v8
        with:
          pattern: wpt-*-report-*
          path: wpt-reports
          merge-multiple: true

      - name: Aggregate WPT compatibility summary
        run: |
          mkdir -p wpt-summary
          npx tsx scripts/wpt-ci-summary.ts \
            --input wpt-reports \
            --json wpt-summary/wpt-compat-summary.json \
            --markdown wpt-summary/wpt-compat-summary.md

      - name: Publish WPT summary
        run: cat wpt-summary/wpt-compat-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload WPT compatibility summary
        uses: actions/upload-artifact@v6
        with:
          name: wpt-compat-summary
          path: wpt-summary/*
          if-no-files-found: error

  wpt-webdriver-tests:
    name: wpt-webdriver
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json
          moon update --manifest-path browser/jsbidi/moon.mod.json

      - name: Prefetch BiDi dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path browser/jsbidi/moon.mod.json

      - name: Build BiDi server
        run: |
          bash scripts/ci/run-moon-step.sh bidi-build moon -C browser/jsbidi build bidi_main --target js --release -j 1
          bash scripts/ci/run-moon-step.sh webdriver-fixture-build moon -C browser/jsbidi build webdriver_fixture_builder --target js --release -j 1

      - name: Run WebDriver BiDi shard
        run: |
          export WPT_TIMEOUT_MULTIPLIER=2.0
          mkdir -p wpt-reports
          status=0
          run_quick() {
            local target="$1"
            local report="$2"
            if ! npx tsx scripts/wpt-webdriver-runner.ts --quick "$target" --json "$report"; then
              echo "::error title=WPT WebDriver shard failed::$target"
              status=1
            fi
          }

          run_quick "errors" "wpt-reports/wpt-webdriver-errors.json"
          run_quick "session/status" "wpt-reports/wpt-webdriver-session-status.json"
          run_quick "session/subscribe/events.py" "wpt-reports/wpt-webdriver-session-subscribe-events.json"
          run_quick "session/unsubscribe/events.py" "wpt-reports/wpt-webdriver-session-unsubscribe-events.json"
          run_quick "browsing_context/get_tree" "wpt-reports/wpt-webdriver-browsing-context-get-tree.json"
          run_quick "browsing_context/context_created/context_created.py" "wpt-reports/wpt-webdriver-browsing-context-context-created.json"
          run_quick "script/evaluate/invalid.py" "wpt-reports/wpt-webdriver-script-evaluate-invalid.json"
          run_quick "script/get_realms" "wpt-reports/wpt-webdriver-script-get-realms.json"
          run_quick "script/realm_created/realm_created.py" "wpt-reports/wpt-webdriver-script-realm-created.json"
          run_quick "script/realm_created/window_open.py" "wpt-reports/wpt-webdriver-script-realm-window-open.json"
          exit $status

      - name: Upload WPT WebDriver shard report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wpt-webdriver-report-all
          path: wpt-reports/wpt-webdriver-*.json
          if-no-files-found: warn

      - name: Upload Moon diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: moon-diagnostics-wpt-webdriver
          path: ci-logs/**
          if-no-files-found: warn

  playwright-bidi-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json
          moon update --manifest-path browser/jsbidi/moon.mod.json

      - name: Prefetch BiDi dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path browser/jsbidi/moon.mod.json

      - name: Build BiDi server
        run: bash scripts/ci/run-moon-step.sh bidi-build moon -C browser/jsbidi build bidi_main --target js --release -j 1

      - name: Start BiDi server
        run: |
          just start-bidi &
          sleep 3

      - name: Run Playwright adapter tests
        run: just test-playwright-adapter

      - name: Run Playwright BiDi E2E tests
        run: just test-playwright

      - name: Run website loading tests
        run: just test-website

      - name: Run all Playwright tests with JSON reporter
        if: always()
        run: |
          pnpm exec playwright test \
            tests/playwright-adapter.test.ts \
            tests/bidi-e2e.test.ts \
            tests/website-loading.test.ts \
            tests/browser-user-scenarios.test.ts \
            --reporter json \
            > playwright-report.json || true

      - name: Upload Playwright JSON report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report.json
          if-no-files-found: warn

      - name: Build Playwright report summary
        if: always()
        run: just playwright-report-summary playwright-report.json playwright-bidi playwright-summary

      - name: Publish Playwright report summary
        if: always()
        run: cat playwright-summary/playwright-bidi.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-summary
          path: playwright-summary/*
          if-no-files-found: warn

      - name: Upload Moon diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: moon-diagnostics-playwright-bidi
          path: ci-logs/**
          if-no-files-found: warn

  flaker-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Validate flaker/report tool tests
        run: pnpm exec vitest run scripts/flaker-cli-path.test.ts scripts/flaker-collected-summary-paths.test.ts scripts/flaker-config.test.ts scripts/flaker-quarantine.test.ts scripts/flaker-task-config.test.ts scripts/flaker-task-run.test.ts scripts/flaker-task-record.test.ts scripts/flaker-task-record-artifacts.test.ts scripts/flaker-task-summary.test.ts scripts/flaker-batch-summary-core.test.ts scripts/flaker-batch-summary-loader.test.ts scripts/flaker-batch-summary.test.ts scripts/playwright-report-summary.test.ts scripts/script-boundary.test.ts scripts/vrt-report-contract.test.ts scripts/vrt-report-loader.test.ts scripts/vrt-report-summary.test.ts scripts/vrt-report-summary-cli.test.ts tests/helpers/crater-vrt.test.ts

      - name: Build flaker config summary
        run: just flaker-report flaker-report

      - name: Publish flaker config summary
        run: cat flaker-report/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build flaker quarantine summary
        run: just flaker-quarantine-report flaker-quarantine-report

      - name: Publish flaker quarantine summary
        run: |
          printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat flaker-quarantine-report/quarantine.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload flaker config summary
        uses: actions/upload-artifact@v6
        with:
          name: flaker-config-summary
          path: flaker-report/*
          if-no-files-found: error

      - name: Upload flaker quarantine summary
        uses: actions/upload-artifact@v6
        with:
          name: flaker-quarantine-summary
          path: flaker-quarantine-report/*
          if-no-files-found: error

  vrt-bench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Update MoonBit dependencies
        run: moon update

      - name: Validate VRT bench parser tests
        run: pnpm exec vitest run scripts/vrt-bench.test.ts

      - name: Run VRT API benchmarks
        run: just bench-vrt-report api vrt-bench

      - name: Run VRT phase benchmarks
        run: just bench-vrt-report phases vrt-bench

      - name: Publish VRT bench summary
        run: |
          cat vrt-bench/api.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat vrt-bench/phases.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload VRT bench summary
        uses: actions/upload-artifact@v6
        with:
          name: vrt-bench-summary
          path: vrt-bench/*
          if-no-files-found: error

  playwright-paint-vrt:
    name: paint-vrt (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      METRIC_CI_ROOT: ${{ github.workspace }}/metric-ci
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - name: fixtures-a1
            grep: 'fixture: (cards and controls|pricing cards|login form)'
          - name: fixtures-a2
            grep: 'fixture: (blog article|navigation bar|footer)'
          - name: fixtures-b
            grep: 'fixture: (live form state|hackernews-style|canvas background|table with cellpadding and cellspacing|table with cellpadding=10)'
          - name: realworld
            grep: 'real-world snapshot:|example-com visual parity'
          - name: url
            grep: 'url snapshot:'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Install metric-ci CLI package
        id: metric_ci_package
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm add --no-save @mizchi/flaker@latest

      - name: Checkout metric-ci source fallback
        if: steps.metric_ci_package.outcome == 'failure'
        id: metric_ci_source
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: mizchi/metric-ci
          path: metric-ci

      - name: Install metric-ci source dependencies
        if: steps.metric_ci_source.outcome == 'success'
        run: pnpm install
        working-directory: metric-ci

      - name: Build metric-ci source CLI
        if: steps.metric_ci_source.outcome == 'success'
        run: pnpm run build
        working-directory: metric-ci

      - name: Install Playwright browsers for VRT
        if: steps.paint_vrt_playwright_cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install compatible fonts for VRT
        run: bash scripts/ci/install-compatible-fonts.sh

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json
          moon update --manifest-path browser/jsbidi/moon.mod.json

      - name: Prefetch BiDi dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path browser/jsbidi/moon.mod.json

      - name: Build BiDi server
        run: bash scripts/ci/run-moon-step.sh bidi-build moon -C browser/jsbidi build bidi_main --target js --release -j 1

      - name: Run paint VRT with flaker record
        id: paint_vrt_record
        if: steps.metric_ci_package.outcome == 'success' || steps.metric_ci_source.outcome == 'success'
        continue-on-error: true
        run: |
          node scripts/flaker-task-record.ts \
            --task paint-vrt \
            --report-path paint-vrt-report.json \
            --summary-dir paint-vrt-summary \
            -- \
            --grep "${{ matrix.grep }}"

      - name: Run paint VRT without metric-ci fallback
        if: steps.metric_ci_package.outcome != 'success' && steps.metric_ci_source.outcome != 'success'
        run: pnpm exec playwright test tests/paint-vrt.test.ts --grep "${{ matrix.grep }}"

      - name: Upload paint VRT JSON report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: paint-vrt-report-${{ matrix.name }}
          path: paint-vrt-report.json
          if-no-files-found: warn

      - name: Publish paint VRT report summary
        if: always()
        run: |
          echo "### paint-vrt ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          if [ -f paint-vrt-summary/paint-vrt.md ]; then
            cat paint-vrt-summary/paint-vrt.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_paint-vrt report summary was not generated._" >> "$GITHUB_STEP_SUMMARY"
            printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build paint VRT flaker task summary
        if: always() && (steps.metric_ci_package.outcome == 'success' || steps.metric_ci_source.outcome == 'success')
        continue-on-error: true
        run: just flaker-task-summary paint-vrt paint-vrt-flaker-summary

      - name: Publish paint VRT flaker task summary
        if: always()
        run: |
          if [ -f paint-vrt-flaker-summary/paint-vrt.md ]; then
            cat paint-vrt-flaker-summary/paint-vrt.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_paint-vrt flaker summary was not generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build paint VRT artifact summary
        if: always()
        run: just vrt-report-summary output/playwright/vrt paint-vrt-artifacts paint-vrt-artifact-summary paint-vrt

      - name: Publish paint VRT artifact summary
        if: always()
        run: |
          if [ -f paint-vrt-artifact-summary/paint-vrt-artifacts.md ]; then
            printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat paint-vrt-artifact-summary/paint-vrt-artifacts.md >> "$GITHUB_STEP_SUMMARY"
          else
            printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            echo "_paint-vrt artifact summary was not generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload paint VRT report summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: paint-vrt-summary-${{ matrix.name }}
          path: paint-vrt-summary/*
          if-no-files-found: warn

      - name: Upload paint VRT flaker task summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: paint-vrt-flaker-summary-${{ matrix.name }}
          path: paint-vrt-flaker-summary/*
          if-no-files-found: warn

      - name: Upload paint VRT artifact summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: paint-vrt-artifact-summary-${{ matrix.name }}
          path: paint-vrt-artifact-summary/*
          if-no-files-found: warn

      - name: Upload paint VRT artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: paint-vrt-artifacts-${{ matrix.name }}
          path: |
            output/playwright/vrt/**
            test-results/**
          if-no-files-found: warn

      - name: Upload Moon diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: moon-diagnostics-paint-vrt-${{ matrix.name }}
          path: ci-logs/**
          if-no-files-found: warn

      - name: Fail job when paint VRT failed
        if: steps.paint_vrt_record.outcome == 'failure'
        run: exit 1

  paint-vrt-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - playwright-paint-vrt

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Validate paint VRT summary tests
        run: pnpm exec vitest run scripts/vrt-report-summary.test.ts

      - name: Download paint VRT shard artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: paint-vrt-artifacts-*
          path: paint-vrt-reports
          merge-multiple: true

      - name: Aggregate paint VRT artifact summary
        run: just vrt-report-summary paint-vrt-reports/output/playwright/vrt paint-vrt-artifacts paint-vrt-artifact-summary paint-vrt

      - name: Publish paint VRT artifact summary
        run: cat paint-vrt-artifact-summary/paint-vrt-artifacts.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload paint VRT artifact summary
        uses: actions/upload-artifact@v6
        with:
          name: paint-vrt-artifact-summary
          path: paint-vrt-artifact-summary/*
          if-no-files-found: error

  wpt-vrt-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build WPT VRT matrix
        id: build
        run: |
          matrix="$(node scripts/wpt-vrt-shards.mjs --github-matrix)"
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  playwright-wpt-vrt:
    name: wpt-vrt (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: wpt-vrt-matrix
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.wpt-vrt-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install

      - name: Restore WPT VRT reference fixtures
        id: wpt_vrt_reference_cache
        uses: actions/cache@v4
        with:
          path: .cache/wpt-vrt-reference
          key: wpt-vrt-reference-${{ runner.os }}-${{ hashFiles('tests/wpt-vrt.test.ts', 'tests/helpers/crater-vrt.ts', 'tests/helpers/wpt-vrt-utils.ts', 'scripts/wpt-html-utils.ts', 'scripts/ci/install-compatible-fonts.sh', 'wpt-vrt.json', 'package.json', 'pnpm-lock.yaml') }}

      - name: Restore Playwright Chromium browser cache
        id: wpt_vrt_playwright_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}

      - name: Install Playwright browsers for VRT
        if: steps.wpt_vrt_playwright_cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install compatible fonts for VRT
        run: bash scripts/ci/install-compatible-fonts.sh

      - name: Update MoonBit dependencies
        run: |
          moon update
          moon update --manifest-path browser/moon.mod.json
          moon update --manifest-path browser/jsbidi/moon.mod.json

      - name: Prefetch BiDi dependencies
        run: bash scripts/ci/prefetch-moon-deps.sh --manifest-path browser/jsbidi/moon.mod.json

      - name: Build BiDi server
        run: bash scripts/ci/run-moon-step.sh bidi-build moon -C browser/jsbidi build bidi_main --target js --release -j 1

      - name: Run WPT VRT shard
        run: just test-wpt-vrt
        env:
          WPT_VRT_SHARD_NAME: ${{ matrix.name }}
          WPT_VRT_SHARD: ${{ matrix.modules }}
          WPT_VRT_OFFSET: ${{ matrix.offset || '0' }}
          WPT_VRT_LIMIT: ${{ matrix.limit || '0' }}

      - name: Build WPT VRT shard summary
        if: always()
        run: just wpt-vrt-report output/playwright/vrt/wpt/wpt-vrt-results.json ${{ matrix.name }} wpt-vrt-summary

      - name: Upload WPT VRT artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wpt-vrt-artifacts-${{ matrix.name }}
          path: |
            output/playwright/vrt/**
            test-results/**
          if-no-files-found: warn

      - name: Upload WPT VRT shard summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wpt-vrt-summary-${{ matrix.name }}
          path: wpt-vrt-summary/*
          if-no-files-found: warn

      - name: Upload Moon diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: moon-diagnostics-wpt-vrt-${{ matrix.name }}
          path: ci-logs/**
          if-no-files-found: warn

  wpt-vrt-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - playwright-wpt-vrt

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Validate WPT VRT summary tests
        run: pnpm exec vitest run scripts/wpt-vrt-summary.test.ts scripts/wpt-vrt-summary-cli.test.ts

      - name: Download WPT VRT shard summaries
        uses: actions/download-artifact@v8
        with:
          pattern: wpt-vrt-summary-*
          path: wpt-vrt-reports
          merge-multiple: true

      - name: Aggregate WPT VRT summary
        run: just wpt-vrt-report-aggregate wpt-vrt-reports wpt-vrt-summary

      - name: Publish WPT VRT summary
        run: cat wpt-vrt-summary/wpt-vrt-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload WPT VRT summary
        uses: actions/upload-artifact@v6
        with:
          name: wpt-vrt-summary
          path: wpt-vrt-summary/*
          if-no-files-found: error

  ci-timing-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - test
      - js-package
      - wasm-component
      - wpt-css-tests
      - wpt-dom-tests
      - wpt-webdriver-tests
      - wpt-compat-summary
      - playwright-bidi-tests
      - flaker-config
      - vrt-bench
      - playwright-paint-vrt
      - paint-vrt-summary
      - wpt-vrt-matrix
      - playwright-wpt-vrt
      - wpt-vrt-summary
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Collect CI job timings
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const filtered = jobs.filter((job) => job.name !== "ci-timing-summary");
            fs.mkdirSync("ci-timing", { recursive: true });
            fs.writeFileSync(
              "ci-timing/jobs.json",
              JSON.stringify({ run_id: context.runId, jobs: filtered }, null, 2),
              "utf-8",
            );

      - name: Build CI timing summary
        run: |
          npx tsx scripts/ci-timing-summary.ts \
            --input ci-timing/jobs.json \
            --json ci-timing/summary.json \
            --markdown ci-timing/summary.md

      - name: Publish CI timing summary
        run: cat ci-timing/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI timing summary
        uses: actions/upload-artifact@v6
        with:
          name: ci-timing-summary
          path: ci-timing/*
          if-no-files-found: error
